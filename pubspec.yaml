name: flutter_application_2
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # Cupertino icons for iOS style icons
  cupertino_icons: ^1.0.8
  
  # QR code scanner for scanning QR codes
  qr_code_scanner: ^1.0.1
  
  # LatLong utilities for geographical data
  latlong2: ^0.9.1
  
  # Flutter Map for displaying maps (TomTom integration)
  flutter_map: ^8.0.0
  
  # Geolocation services for obtaining current location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  http: ^1.3.0
  mysql1: ^0.20.0
  
  # Proj4 Dart for coordinate system transformations
  proj4dart: ^2.1.0
  
  # Google Maps Flutter package (if needed alongside TomTom)
  google_maps_flutter: ^2.5.0
  carousel_slider: ^5.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lints for recommended Flutter development practices
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
